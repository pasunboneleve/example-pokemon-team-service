name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
      AWS_LAMBDA_FUNCTION_NAME: ${{ vars.AWS_LAMBDA_FUNCTION_NAME }}
      AWS_LAMBDA_MEMORY_SIZE: ${{ vars.AWS_LAMBDA_MEMORY_SIZE }}
      AWS_LAMBDA_TIMEOUT: ${{ vars.AWS_LAMBDA_TIMEOUT }}

    steps:
      - name: Check configuration
        run: |
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "Configure the AWS_ROLE_TO_ASSUME GitHub Actions secret before running CI."
            exit 1
          fi

          if [ -z "${{ vars.AWS_REGION }}" ] || [ -z "${{ vars.AWS_ECR_REPOSITORY }}" ] || [ -z "${{ vars.AWS_LAMBDA_FUNCTION_NAME }}" ]; then
            echo "Configure AWS_REGION, AWS_ECR_REPOSITORY, and AWS_LAMBDA_FUNCTION_NAME GitHub Actions variables before running CI."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Lambda function
        env:
          IMAGE_IDENTIFIER: ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          aws lambda get-function --function-name "${AWS_LAMBDA_FUNCTION_NAME}" >/dev/null

          aws lambda wait function-active-v2 \
            --function-name "${AWS_LAMBDA_FUNCTION_NAME}"

          aws lambda update-function-code \
            --function-name "${AWS_LAMBDA_FUNCTION_NAME}" \
            --image-uri "${IMAGE_IDENTIFIER}"

          aws lambda wait function-updated-v2 \
            --function-name "${AWS_LAMBDA_FUNCTION_NAME}"

          aws lambda update-function-configuration \
            --function-name "${AWS_LAMBDA_FUNCTION_NAME}" \
            --timeout "${AWS_LAMBDA_TIMEOUT}" \
            --memory-size "${AWS_LAMBDA_MEMORY_SIZE}"

          aws lambda wait function-updated-v2 \
            --function-name "${AWS_LAMBDA_FUNCTION_NAME}"

      - name: Show function URL
        run: |
          aws lambda get-function-url-config \
            --function-name "${AWS_LAMBDA_FUNCTION_NAME}" \
            --query FunctionUrl \
            --output text
